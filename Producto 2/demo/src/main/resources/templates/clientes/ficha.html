<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ficha Cliente')}"></head>
<body class="main">

<div th:replace="~{fragments/layout :: navbar}" th:with="activePage='clientes'"></div>

<main class="main">
    <div class="breadcrumb">
        <a th:href="@{/clientes}">Clientes</a>
        <span class="sep">›</span>
        <span class="current" th:text="${cliente.nombre + ' ' + cliente.apellidos}"></span>
    </div>

    <div class="page-header">
        <div>
            <div class="page-title" th:text="${cliente.nombre + ' ' + cliente.apellidos}"></div>
            <div class="page-subtitle">Ficha de cliente y historial de alquileres</div>
        </div>
        <div style="display:flex;gap:10px;">
            <button class="btn btn-outline btn-disabled" disabled>
                <span class="material-icons">edit</span> Editar
            </button>
            <button class="btn-danger btn-disabled" disabled>
                <span class="material-icons">delete</span> Borrar
            </button>
        </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px;">
        <div class="form-card">
            <div class="form-card-header"><h2>Datos personales</h2></div>
            <div class="form-card-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <span th:text="${cliente.nombre + ' ' + cliente.apellidos}"></span>
                    </div>
                    <div class="form-group">
                        <label>DNI</label>
                        <span th:text="${cliente.dni}"></span>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <span th:text="${cliente.email}"></span>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <span th:text="${cliente.telefono}"></span>
                    </div>
                    <div class="form-group">
                        <label>Dirección</label>
                        <span th:text="${cliente.direccion}"></span>
                    </div>
                    <div class="form-group">
                        <label>Registrado</label>
                        <span th:text="${cliente.fechaRegistro}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div style="font-size:18px;font-weight:600;margin-bottom:14px;">Historial de alquileres</div>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Vehículo</th>
                <th>Recogida</th>
                <th>Devolución</th>
                <th>Fechas</th>
                <th>Total</th>
                <th>Estado</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="alquiler : ${cliente.alquileres}">
                <td th:text="${alquiler.vehiculo.marca + ' ' + alquiler.vehiculo.modelo}"></td>
                <td th:text="${alquiler.sedeRecogida.nombre}"></td>
                <td th:text="${alquiler.sedeDevolucion.nombre}"></td>
                <td class="td-secondary" th:text="${alquiler.fechaInicio + ' – ' + alquiler.fechaFin}"></td>
                <td><strong th:text="${alquiler.precioTotal + '€'}"></strong></td>
                <td>
                        <span th:class="${alquiler.estado.name() == 'ACTIVO'} ? 'badge badge-success' :
                                        (${alquiler.estado.name() == 'PENDIENTE'} ? 'badge badge-pending' : 'badge badge-neutral')"
                              th:text="${alquiler.estado}">
                        </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(cliente.alquileres)}">
                <td colspan="6" style="text-align:center;color:var(--text-secondary);padding:40px;">
                    Este cliente no tiene alquileres registrados
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
