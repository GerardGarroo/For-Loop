<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Clientes')}"></head>
<body class="page">

<div th:replace="~{fragments/layout :: navbar}" th:with="activePage='clientes'"></div>

<main class="main">
    <div class="page-header">
        <div>
            <div class="page-title">Clientes</div>
            <div class="page-subtitle">Usuarios registrados en la plataforma</div>
        </div>
        <button class="btn btn-disabled" disabled>
            <span class="material-icons">add</span> Añadir Cliente
        </button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>DNI</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Registrado</th>
                <th>Gestión</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${clientes}">
                <td><strong th:text="${cliente.nombre + ' ' + cliente.apellidos}"></strong></td>
                <td class="td-secondary" th:text="${cliente.dni}"></td>
                <td class="td-secondary" th:text="${cliente.email}"></td>
                <td class="td-secondary" th:text="${cliente.telefono}"></td>
                <td class="td-secondary" th:text="${cliente.fechaRegistro}"></td>
                <td>
                    <div class="actions">
                        <a th:href="@{/clientes/{id}(id=${cliente.id})}" class="btn btn-outline btn-sm">Ver</a>
                        <button class="btn btn-outline btn-sm btn-disabled" disabled>Editar</button>
                        <button class="btn-danger btn-sm btn-disabled" disabled>
                            <span class="material-icons">delete</span>
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
