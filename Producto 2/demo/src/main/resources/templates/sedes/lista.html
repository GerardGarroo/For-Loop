<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sedes')}"></head>
<body class="page">

<div th:replace="~{fragments/layout :: navbar}" th:with="activePage='sedes'"></div>

<main class="main">
    <div class="page-header">
        <div>
            <div class="page-title">Sedes</div>
            <div class="page-subtitle">Puntos de recogida y devolución de vehículos</div>
        </div>
        <button class="btn btn-disabled" disabled>
            <span class="material-icons">add</span> Añadir Sede
        </button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Ciudad</th>
                <th>Dirección</th>
                <th>Teléfono</th>
                <th>Gestión</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="sede : ${sedes}">
                <td><strong th:text="${sede.nombre}"></strong></td>
                <td th:text="${sede.ciudad}"></td>
                <td class="td-secondary" th:text="${sede.direccion}"></td>
                <td class="td-secondary" th:text="${sede.telefono}"></td>
                <td>
                    <div class="actions">
                        <button class="btn btn-outline btn-sm btn-disabled" disabled>Editar</button>
                        <button class="btn-danger btn-sm btn-disabled" disabled>
                            <span class="material-icons">delete</span>
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
